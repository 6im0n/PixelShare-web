name: Deploy Front-End to Server

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/6im0n/pixelshare-web

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          build-args: |
            NUXT_PUBLIC_API_BASE=${{ secrets.NUXT_PUBLIC_API_BASE }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u 6im0n --password-stdin
            docker pull ghcr.io/6im0n/pixelshare-web:latest
            cd /home/pixelshare/frontend
            NUXT_PUBLIC_API_BASE=https://pixelshare.srv.simon-gl.fr/ docker compose -f docker-compose.prod.yml up -d
